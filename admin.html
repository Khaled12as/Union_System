<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f0f7f4; }</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <header class="bg-[#2d6a4f] text-white p-6 rounded-2xl shadow-lg mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">لوحة قيادة الهيئة الإدارية 🌾</h1>
            <p id="status-text" class="opacity-80 text-sm">يتم التحديث تلقائياً...</p>
        </div>
        <button onclick="fetchComplaints()" class="bg-white text-[#2d6a4f] px-4 py-2 rounded-lg font-bold">تحديث يدوي</button>
    </header>

    <div class="mb-6 flex gap-2">
        <button onclick="filterStatus('all')" class="bg-gray-200 px-4 py-2 rounded-lg">الكل</button>
        <button onclick="filterStatus('قيد المراجعة')" class="bg-yellow-200 px-4 py-2 rounded-lg">المعلق</button>
    </div>

    <div id="complaintsBody" class="grid gap-6"></div>
</div>

<script>
    // في ملف admin.html، أضف هذا الكود في البداية:
const password = prompt("يرجى إدخال كلمة مرور الهيئة الإدارية:");
if (password !== "Agri2026") {
    document.body.innerHTML = "<h1>عذراً، الدخول غير مصرح به!</h1>";
    throw new Error("Unauthorized");
}
    let allData = []; // تخزين البيانات محلياً للفلترة

    async function fetchComplaints() {
        const response = await fetch('https://union-system.onrender.com/api/all-complaints');
        allData = await response.json();
        render(allData);
        document.getElementById('status-text').innerText = "آخر تحديث: " + new Date().toLocaleTimeString('ar-SA');
    }

    function render(data) {
        const body = document.getElementById('complaintsBody');
body.innerHTML = data.map(c => `
    <div class="card p-4 border rounded shadow mb-4">
        <h3 class="font-bold">${c.subject}</h3>
        <p>${c.message}</p>
        <p class="text-sm text-gray-500">الرد: ${c.admin_reply || 'لا يوجد رد بعد'}</p>
        <textarea id="reply-${c.id}" class="w-full border p-1"></textarea>
        <button onclick="sendReply(${c.id})" class="bg-green-600 text-white p-2 mt-2">إرسال</button>
    </div>
`).join('');    }

    function filterStatus(status) {
        if(status === 'all') return render(allData);
        render(allData.filter(c => c.status === status));
    }

async function sendReply(complaintId) {
    const replyText = document.getElementById(`reply-${complaintId}`).value;
    
    try {
        const response = await fetch(`https://union-system.onrender.com/api/reply/${complaintId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reply: replyText })
        });
        
        if (response.ok) {
            alert('تم إرسال الرد بنجاح!');
            fetchComplaints(); // تحديث القائمة بعد الرد مباشرة
        } else {
            alert('حدث خطأ أثناء الإرسال');
        }
    } catch (error) {
        console.error('Error:', error);
    }
}        
fetchComplaints();

    // تحديث تلقائي كل 10 ثواني
    setInterval(fetchComplaints, 10000);
    fetchComplaints();
</script>
</body>
</html>
