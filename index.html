<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة طلبة الهندسة الزراعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #2d6a4f; /* أخضر زراعي عميق */
            --light-green: #d8f3dc; /* أخضر فاتح للخلفيات */
            --accent-gold: #f4a261; /* لون سنابل القمح */
            --text-dark: #1b4332;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--light-green);
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); /* نقش خفيف يضيف فخامة */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(45, 106, 79, 0.2);
            overflow: hidden;
            position: relative;
        }

        /* شريط علوي مزخرف */
        .header {
            background: linear-gradient(135deg, var(--primary-green), #40916c);
            padding: 30px 20px;
            text-align: center;
            color: var(--white);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 100%;
            height: 30px;
            background: var(--white);
            transform: skewY(-3deg);
        }

        .header i {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .form-content {
            padding: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 15px;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f9fbf9;
            color: var(--text-dark);
        }

        .input-group textarea {
            height: 120px;
            resize: none;
        }

        .input-group input:focus, 
        .input-group textarea:focus {
            border-color: var(--primary-green);
            outline: none;
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.1);
            background-color: var(--white);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-green);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: #1b4332;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 67, 50, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* رسائل النجاح والخطأ */
        .notification {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لمسة بصرية: أوراق شجر في الزوايا */
        .leaf-decoration {
            position: absolute;
            opacity: 0.1;
            z-index: -1;
            width: 150px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fa-solid fa-wheat-awn"></i>
            <h1>جامعة حمص</h1>
            <h1>الهيئة الطلابية - اتحاد الطلبة</h1>
            <p>كلية الهندسة الزراعية - بوابة الشكاوى والمقترحات </p>
        </div>

        <div class="form-content">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="name" placeholder="الاسم الثلاثي (اختياري)">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-tag"></i>
                <input type="text" id="subject" placeholder="موضوع الشكوى أو المقترح">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-seedling" style="top: 18px;"></i>
                <textarea id="message" placeholder="اكتب تفاصيل الشكوى هنا... نحن في الهيئة الإدارية هنا لسماعك ودعمك."></textarea>
            </div>

            <button onclick="sendComplaint()" id="submitBtn">
                <span>إرسال للإدارة</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>

            <div id="status" class="notification"></div>
        </div>
    </div>

    <script>
        async function sendComplaint() {
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            const name = document.getElementById('name').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            // التحقق من الحقول المطلوبة
            if(!subject || !message) {
                statusDiv.className = 'notification error';
                statusDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> يرجى كتابة الموضوع وتفاصيل الشكوى';
                statusDiv.style.display = 'block';
                return;
            }

            // تغيير حالة الزر أثناء الإرسال
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';
            btn.disabled = true;

            const data = {
                name: name || "طالب (غير مصرح بالاسم)",
                subject: subject,
                message: message
            };

            try {
                const response = await fetch('https://union-system.onrender.com/api/all-complaints', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    statusDiv.className = 'notification success';
                    statusDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i> تم استلام الشكوى بنجاح وسيتم متابعتها من قبل الهيئة.';
                    // تفريغ الحقول
                    document.getElementById('name').value = '';
                    document.getElementById('subject').value = '';
                    document.getElementById('message').value = '';
                } else {
                    throw new Error('Server response was not ok');
                }
            } catch (error) {
                statusDiv.className = 'notification error';
                statusDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> عذراً، حدث خطأ في الاتصال. تأكد من عمل الخادم.';
            } finally {
                // إعادة الزر لحالته الطبيعية
                btn.innerHTML = '<span>إرسال للإدارة</span> <i class="fa-solid fa-paper-plane"></i>';
                btn.disabled = false;
                statusDiv.style.display = 'block';
                
                // إخفاء الرسالة بعد 5 ثواني
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
